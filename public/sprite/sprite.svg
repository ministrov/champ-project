<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
   <!-- Центрированная плюс-иконка -->
  <symbol id="plus" viewBox="0 0 60 60">
    <!-- Вертикальная линия -->
    <line x1="30" y1="10" x2="30" y2="50" stroke="currentColor" stroke-width="2"/>
    <!-- Горизонтальная линия -->
    <line x1="10" y1="30" x2="50" y2="30" stroke="currentColor" stroke-width="2"/>
  </symbol>
</svg>